<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Delivery App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <main class="app-shell">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
          <div class="card border-0 shadow-lg app-card">
            <div class="card-body p-4 p-md-5">
              <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3 mb-4">
                <div>
                  <p class="text-uppercase text-primary fw-semibold small mb-2">Delivery App</p>
                  <h1 class="h3 mb-1">Base do frontend</h1>
                  <p class="text-secondary mb-0">Bootstrap + AJAX pronta para crescer.</p>
                </div>
                <button id="loadDataBtn" class="btn btn-primary px-4" type="button">Testar AJAX</button>
              </div>

              <div class="alert alert-info mb-4" role="alert">
                Essa base já está preparada para consumir o backend via <strong>fetch</strong>.
              </div>

              <div class="row g-3">
                <div class="col-12 col-md-6">
                  <label for="nameInput" class="form-label">Nome</label>
                  <input id="nameInput" type="text" class="form-control" placeholder="Digite algo">
                </div>
                <div class="col-12 col-md-6">
                  <label for="emailInput" class="form-label">E-mail</label>
                  <input id="emailInput" type="email" class="form-control" placeholder="voce@exemplo.com">
                </div>
                <div class="col-12">
                  <label for="messageInput" class="form-label">Mensagem</label>
                  <textarea id="messageInput" class="form-control" rows="4" placeholder="Espaço para futuros formulários"></textarea>
                </div>
              </div>

              <pre id="responseBox" class="response-box mt-4 mb-0">Resposta do AJAX vai aparecer aqui.</pre>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
